<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ROS 2 PQC Secure Command Pipeline Architecture</title>
  <desc id="desc">A clean system architecture diagram showing a left-to-right ROS 2 command pipeline from Publisher to Signer Node to Verifier Node to Controller, plus a secondary verification event flow.</desc>
  <defs>
    <marker id="main-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 7 4 L 1 7" fill="none" stroke="#475569" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="event-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 7 4 L 1 7" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="soft-shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 42px; font-weight: 760; letter-spacing: 0; }
      .subtitle { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; font-weight: 500; letter-spacing: 0; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#soft-shadow); }
      .signer { stroke: #0f766e; stroke-width: 2.5; }
      .verifier { stroke: #7c3aed; stroke-width: 2.5; }
      .event { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; filter: url(#soft-shadow); }
      .node-title { fill: #111827; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 27px; font-weight: 760; letter-spacing: 0; }
      .event-title { fill: #1e3a8a; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 740; letter-spacing: 0; }
      .label { fill: #334155; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 21px; font-weight: 520; letter-spacing: 0; }
      .small { fill: #64748b; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 520; letter-spacing: 0; }
      .flow-label { fill: #475569; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 620; letter-spacing: 0; }
      .flow-subtitle { fill: #94a3b8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; font-weight: 540; letter-spacing: 0; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#main-arrow); stroke-linecap: round; }
      .event-line { stroke: #3b82f6; stroke-width: 2; fill: none; marker-end: url(#event-arrow); stroke-linecap: round; stroke-dasharray: 7 7; }
      .badge { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1.5; }
      .badge-text { fill: #0f766e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 720; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>

  <text class="title" x="80" y="92">ROS 2 PQC Secure Command Pipeline</text>
  <text class="subtitle" x="80" y="134">Application-layer ML-DSA-44 signing and verification for control commands</text>

  <rect class="node" x="70" y="315" width="200" height="150" rx="14"/>
  <text class="node-title" x="170" y="375" text-anchor="middle">Publisher</text>
  <text class="small" x="170" y="410" text-anchor="middle">raw command source</text>

  <rect class="node signer" x="430" y="260" width="250" height="260" rx="16"/>
  <text class="node-title" x="555" y="310" text-anchor="middle">Signer Node</text>
  <rect class="badge" x="482" y="332" width="146" height="31" rx="15"/>
  <text class="badge-text" x="555" y="354" text-anchor="middle">protect</text>
  <text class="label" x="470" y="397">ML-DSA Sign</text>
  <text class="label" x="470" y="429">SHA-256 Digest</text>
  <text class="label" x="470" y="461">Sequence</text>
  <text class="label" x="470" y="493">TTL</text>

  <rect class="node verifier" x="850" y="260" width="270" height="260" rx="16"/>
  <text class="node-title" x="985" y="310" text-anchor="middle">Verifier Node</text>
  <rect class="badge" x="911" y="332" width="148" height="31" rx="15"/>
  <text class="badge-text" x="985" y="354" text-anchor="middle">enforce</text>
  <text class="label" x="890" y="397">Digest Check</text>
  <text class="label" x="890" y="429">Signature Verify</text>
  <text class="label" x="890" y="461">Replay Protection</text>
  <text class="label" x="890" y="493">TTL Validation</text>

  <rect class="node" x="1310" y="315" width="220" height="150" rx="14"/>
  <text class="node-title" x="1420" y="375" text-anchor="middle">Controller</text>
  <text class="small" x="1420" y="410" text-anchor="middle">uses verified commands</text>

  <rect class="event" x="855" y="650" width="260" height="110" rx="14"/>
  <text class="event-title" x="985" y="696" text-anchor="middle">/pqc/verify_event</text>
  <text class="small" x="985" y="728" text-anchor="middle">latency and result code</text>

  <path class="arrow" d="M 270 390 L 430 390"/>
  <path class="arrow" d="M 680 390 L 850 390"/>
  <path class="arrow" d="M 1120 390 L 1310 390"/>
  <path class="event-line" d="M 985 520 L 985 650"/>

  <text class="flow-label" x="350" y="352" text-anchor="middle">/cmd_vel/raw</text>
  <text class="flow-subtitle" x="350" y="376" text-anchor="middle">Twist</text>
  <text class="flow-label" x="765" y="352" text-anchor="middle">/cmd_vel/signed</text>
  <text class="flow-subtitle" x="765" y="376" text-anchor="middle">SignedTwist</text>
  <text class="flow-label" x="1215" y="352" text-anchor="middle">/cmd_vel/verified</text>
  <text class="flow-subtitle" x="1215" y="376" text-anchor="middle">accepted Twist</text>

  <text class="small" x="80" y="835">Boundary: application-layer command protection. DDS-Security / SROS2 can still be used below this layer.</text>
</svg>
